<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=\, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function simpleAxios(setObj){
      return new Promise((resolve,reject)=>{
        const xhr = new XMLHttpRequest()
        if(setObj.params){
          const paramsObj = new URLSearchParams(setObj.params)
          const queryObj = paramsObj.toString()
          setObj.url+=`?${queryObj}`
        }
        xhr.open(setObj.method||"GET",setObj.url)
        xhr.addEventListener("loadend",()=>{
          if(xhr.status>=200&&xhr.status<300){
            resolve(JSON.parse(xhr.response))
          }
          else{
            reject(new Error(xhr.response))
          }
        })
        xhr.send()
      })
    }
    simpleAxios({
      url:"https://hmajax.itheima.net/api/area",
      params:{
        pname:"辽宁省",
        cname:"大连市"
      }
    }).then(res=>{
      console.log(res);
    }).catch(rej=>{
      console.log(rej.message)
    })
  </script>
</body>
</html>
